<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第4回夜 腹部解剖クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:12px}
#app{width:100%;max-width:480px}
#screen{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.header{background:#185FA5;color:#fff;padding:14px 16px;text-align:center}
.header h1{font-size:16px;font-weight:700}
.header .sub{font-size:12px;opacity:.8;margin-top:2px}
.img-wrap{width:100%;background:#000;position:relative}
.img-wrap img{width:100%;display:block;max-height:260px;object-fit:contain}
.img-label{position:absolute;top:6px;left:6px;background:rgba(24,95,165,0.85);color:#fff;font-size:11px;padding:3px 8px;border-radius:10px}
.q-box{padding:12px 16px}
.q-num{font-size:11px;color:#888;margin-bottom:4px}
.q-text{font-size:17px;font-weight:600;color:#1a1a2e;margin-bottom:12px}
.timer-bar{height:5px;background:#e0e0e0;border-radius:3px;margin-bottom:12px;overflow:hidden}
.timer-fill{height:100%;background:#185FA5;border-radius:3px;transition:width 1s linear}
.timer-text{text-align:center;font-size:13px;color:#555;margin-bottom:10px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px}
.choice-btn{background:#f0f4f8;border:2px solid #d0d9e8;border-radius:10px;padding:12px 8px;font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;min-height:52px;display:flex;align-items:center;justify-content:center}
.choice-btn:active{transform:scale(.97)}
.choice-btn.correct{background:#d4edda;border-color:#3B6D11;color:#3B6D11}
.choice-btn.wrong{background:#f8d7da;border-color:#A32D2D;color:#A32D2D}
.result-box{padding:20px 16px;text-align:center}
.result-icon{font-size:48px;margin-bottom:8px}
.result-label{font-size:14px;color:#888;margin-bottom:4px}
.result-ans{font-size:22px;font-weight:700;margin-bottom:8px}
.result-score{font-size:13px;color:#555}
.next-btn{width:calc(100% - 32px);margin:0 16px 16px;background:#185FA5;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer}
.next-btn:active{opacity:.85}
.title-screen{padding:24px 16px;text-align:center}
.title-screen h2{font-size:22px;font-weight:700;color:#185FA5;margin-bottom:8px}
.title-screen p{font-size:14px;color:#666;margin-bottom:20px;line-height:1.6}
.name-input{width:100%;border:2px solid #d0d9e8;border-radius:10px;padding:12px;font-size:16px;margin-bottom:16px;outline:none}
.name-input:focus{border-color:#185FA5}
.start-btn{width:100%;background:#185FA5;color:#fff;border:none;border-radius:10px;padding:14px;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:12px}
.dash-link{font-size:13px;color:#185FA5;text-decoration:underline;cursor:pointer;background:none;border:none;width:100%;text-align:center;padding:8px}
.finish-screen{padding:24px 16px;text-align:center}
.finish-screen h2{font-size:20px;font-weight:700;color:#185FA5;margin-bottom:16px}
.score-circle{width:120px;height:120px;border-radius:50%;background:#185FA5;color:#fff;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-circle .big{font-size:32px;font-weight:800;line-height:1}
.score-circle .small{font-size:12px;opacity:.8}
.stat-row{display:flex;justify-content:space-around;background:#f0f4f8;border-radius:10px;padding:12px;margin-bottom:16px}
.stat-item{text-align:center}
.stat-item .val{font-size:20px;font-weight:700;color:#185FA5}
.stat-item .lbl{font-size:11px;color:#888}
.finish-btn{width:100%;background:#185FA5;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px}
.finish-btn.sub{background:#6c757d}
.dash-screen{padding:0}
.dash-header{background:#185FA5;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
.dash-header h2{font-size:16px;font-weight:700;flex:1}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer}
.dash-tabs{display:flex;border-bottom:2px solid #e0e0e0}
.tab-btn{flex:1;padding:10px;font-size:13px;font-weight:500;border:none;background:#fff;cursor:pointer;color:#888}
.tab-btn.active{color:#185FA5;border-bottom:3px solid #185FA5;margin-bottom:-2px}
.dash-body{padding:12px 16px;max-height:70vh;overflow-y:auto}
.rank-card{background:#f0f4f8;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.rank-num{font-size:18px;font-weight:800;color:#185FA5;width:28px;text-align:center}
.rank-name{flex:1;font-size:14px;font-weight:600}
.rank-score{font-size:14px;font-weight:700;color:#185FA5}
.rank-pct{font-size:12px;color:#888}
.stat-summary{background:#f0f4f8;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center}
.stat-summary .big{font-size:28px;font-weight:800;color:#185FA5}
.stat-summary .lbl{font-size:12px;color:#888}
.q-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-stat-bar-wrap{flex:1;background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden}
.q-stat-bar{height:100%;border-radius:4px}
.q-stat-pct{font-size:12px;color:#555;width:36px;text-align:right}
.q-stat-label{font-size:12px;color:#333;width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pw-box{padding:24px 16px;text-align:center}
.pw-box h3{font-size:16px;margin-bottom:12px;color:#333}
.pw-input{width:100%;border:2px solid #d0d9e8;border-radius:10px;padding:12px;font-size:16px;margin-bottom:12px;outline:none;text-align:center}
.pw-btn{width:100%;background:#185FA5;color:#fff;border:none;border-radius:10px;padding:12px;font-size:16px;cursor:pointer}
.student-card{background:#f0f4f8;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.student-name{font-size:14px;font-weight:600}
.student-meta{font-size:12px;color:#888}
.ans-detail{background:#f8f9fa;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px}
.ans-detail.ok{border-left:3px solid #3B6D11}
.ans-detail.ng{border-left:3px solid #A32D2D}
.csv-btn{width:100%;background:#28a745;color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
.del-btn{width:100%;background:#A32D2D;color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.loading{padding:40px;text-align:center;color:#888;font-size:14px}
</style>
</head>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function render(html){document.getElementById('screen').innerHTML=html;}

async function saveResult(r){
  const all=JSON.parse(localStorage.getItem('quiz_results')||'[]');
  all.push(r);localStorage.setItem('quiz_results',JSON.stringify(all));
  if(GAS_URL){try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({type:'save',result:r})});}catch(e){}}

async function loadAllResults(){

function makeChoices(q,allQs){
  const same=allQs.filter(x=>x.imgIdx===q.imgIdx&&x.id!==q.id);
  const other=allQs.filter(x=>x.imgIdx!==q.imgIdx&&x.id!==q.id);
  const pool=shuffle([...same]).slice(0,3);
  if(pool.length<3)pool.push(...shuffle([...other]).slice(0,3-pool.length));
  return shuffle([q.ans,...pool.slice(0,3).map(x=>x.ans)]);
}

  S.answered=false;S.timeLeft=TIME_LIMIT;
  clearInterval(S.timer);
  render(`<div class="header"><h1>${QUIZ_TITLE}</h1><div class="sub">問題 ${S.qi+1}/${S.qs.length} | スコア ${S.score}</div></div>
<div class="img-wrap"><img src="${IMAGES[q.imgIdx]}" alt="${q.set}"><div class="img-label">${q.set}</div></div>
<div class="q-box">
<div class="q-num">Q${S.qi+1}</div>
<div class="q-text">${q.q}</div>
<div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
<div class="timer-text" id="timerText">${TIME_LIMIT}秒</div>
</div>
<div class="choices" id="choices">
${S.shuffled[S.qi].map((c,i)=>`<button class="choice-btn" onclick="answer('${c.replace(/'/g,"\'")}',this)">${c}</button>`).join('')}
</div>`);
  S.timer=setInterval(()=>{
    S.timeLeft--;
    const fill=$('timerFill');const txt=$('timerText');
    if(fill)fill.style.width=(S.timeLeft/TIME_LIMIT*100)+'%';
    if(txt)txt.textContent=S.timeLeft+'秒';
    if(fill){
      const pct=S.timeLeft/TIME_LIMIT;
      fill.style.background=pct>0.5?'#185FA5':pct>0.25?'#f0a500':'#A32D2D';
    }
    if(S.timeLeft<=0){clearInterval(S.timer);if(!S.answered)timeUp();}
  },1000);
}

function answer(sel,btn){
  if(S.answered)return;
  S.answered=true;clearInterval(S.timer);
  const q=S.qs[S.qi];
  const ok=sel===q.ans;
  const third=Math.floor(TIME_LIMIT/3);
  const bonus=S.timeLeft>=(third*2)?30:S.timeLeft>=third?20:10;
  if(ok){S.score+=100+bonus;S.correct++;S.streak++;if(S.streak>S.maxStreak)S.maxStreak=S.streak;}
  else{S.streak=0;}
  S.answers.push({id:q.id,q:q.q,ans:q.ans,sel:sel,ok:ok,set:q.set});
  document.querySelectorAll('.choice-btn').forEach(b=>{
    if(b.textContent===q.ans)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
    b.disabled=true;
  });
  setTimeout(showQuestion,ok?900:1500);
}

function timeUp(){
  S.answered=true;
  const q=S.qs[S.qi];
  S.streak=0;
  S.answers.push({id:q.id,q:q.q,ans:q.ans,sel:'',ok:false,set:q.set});
  document.querySelectorAll('.choice-btn').forEach(b=>{
    if(b.textContent===q.ans)b.classList.add('correct');
    b.disabled=true;
  });
  setTimeout(showQuestion,1500);
}

async function showFinish(){
  const pct=Math.round(S.correct/S.qs.length*100);
  const result={name:S.name,score:S.score,pct,correct:S.correct,maxStreak:S.maxStreak,time:Date.now(),answers:S.answers};
  await saveResult(result);
  render(`<div class="header"><h1>${QUIZ_TITLE}</h1><div class="sub">結果</div></div>
<div class="finish-screen">
<h2>お疲れさまでした！🎉</h2>
<div class="score-circle"><div class="big">${S.score}</div><div class="small">スコア</div></div>
<div class="stat-row">
<div class="stat-item"><div class="val">${S.correct}/${S.qs.length}</div><div class="lbl">正解数</div></div>
<div class="stat-item"><div class="val">${pct}%</div><div class="lbl">正解率</div></div>
<div class="stat-item"><div class="val">${S.maxStreak}</div><div class="lbl">最大連続正解</div></div>
</div>
<p style="font-size:13px;color:#666;margin-bottom:16px">結果を記録しました ✅</p>
<button class="finish-btn" onclick="startRetry()">もう一度挑戦 🔄</button>
<button class="finish-btn sub" onclick="showTitle()">トップへ戻る</button>
</div>`);
}

function startRetry(){
  S.qs=shuffle([...QUESTIONS]);S.qi=0;S.score=0;S.correct=0;S.streak=0;S.maxStreak=0;S.answers=[];
  S.shuffled=S.qs.map(q=>makeChoices(q,QUESTIONS));
  showQuestion();
}

function showDashLogin(){
  render(`<div class="header"><h1>教員ダッシュボード</h1></div>
<div class="pw-box">
<h3>🔐 パスワードを入力</h3>
<input class="pw-input" id="pwInput" type="password" placeholder="パスワード">
<button class="pw-btn" onclick="checkPw()">ログイン</button>
<br><br><button class="dash-link" style="background:none;border:none;color:#185FA5;text-decoration:underline;cursor:pointer;font-size:13px" onclick="showTitle()">← 戻る</button>
</div>`);
  setTimeout(()=>{const el=$('pwInput');if(el)el.focus();},100);
}

function checkPw(){
  if(($('pwInput')||{value:''}).value===ADMIN_PW)showDash('rank');
  else alert('パスワードが違います');
}

async function showDash(tab){
  S.dashTab=tab;S.selStudent=null;
  render(`<div class="loading">読み込み中...</div>`);
  S.students=await loadAllResults();
  renderDash();
}

function renderDash(){
  const students=S.students||[];
  const sorted=[...students].sort((a,b)=>b.score-a.score);
  const avg=students.length?Math.round(students.reduce((s,x)=>s+x.pct,0)/students.length):0;
  let body='';
  if(S.selStudent){
    const st=S.selStudent;
    body=`<button onclick="S.selStudent=null;renderDash()" style="background:none;border:none;color:#185FA5;font-size:13px;cursor:pointer;margin-bottom:10px">← 一覧に戻る</button>
<div style="font-size:16px;font-weight:700;margin-bottom:4px">${st.name}</div>
<div style="font-size:13px;color:#888;margin-bottom:12px">スコア${st.score} / 正解率${st.pct}% / 連続${st.maxStreak}</div>
${(st.answers||[]).map(a=>`<div class="ans-detail ${a.ok?'ok':'ng'}">
<div style="font-size:12px;color:#888">${a.set} - ${a.q}</div>
<div>正解: ${a.ans}${!a.ok?` <span style="color:#A32D2D">（解答: ${a.sel||'時間切れ'}）</span>`:' ✅'}</div>
</div>`).join('')}`;
  } else if(S.dashTab==='rank'){
    body=`<div class="stat-summary"><div class="big">${students.length}名</div><div class="lbl">受験済み / クラス平均 ${avg}%</div></div>
${sorted.map((s,i)=>`<div class="rank-card">
<div class="rank-num">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
<div><div class="rank-name">${s.name}</div><div class="rank-pct">正解率${s.pct}% / 連続${s.maxStreak}</div></div>
<div class="rank-score">${s.score}pt</div>
</div>`).join('')}`;
  } else if(S.dashTab==='qstat'){
    const qmap={};
    QUESTIONS.forEach(q=>qmap[q.id]={q:q.q,set:q.set,ok:0,total:0});
    students.forEach(s=>(s.answers||[]).forEach(a=>{if(qmap[a.id]){qmap[a.id].total++;if(a.ok)qmap[a.id].ok++;}}));
    const qlist=Object.values(qmap).filter(x=>x.total>0).sort((a,b)=>(a.ok/a.total)-(b.ok/b.total));
    body=qlist.map(x=>{
      const pct=Math.round(x.ok/x.total*100);
      const color=pct>=70?'#3B6D11':pct>=40?'#f0a500':'#A32D2D';
      return `<div class="q-stat-row"><div class="q-stat-label" title="${x.set}:${x.q}">${x.set}</div><div class="q-stat-label" style="width:60px" title="${x.q}">${x.q}</div><div class="q-stat-bar-wrap"><div class="q-stat-bar" style="width:${pct}%;background:${color}"></div></div><div class="q-stat-pct">${pct}%</div></div>`;
    }).join('')||'<div style="text-align:center;color:#888;padding:20px">データがありません</div>';
  } else if(S.dashTab==='hist'){
    body=sorted.map(s=>`<div class="student-card" onclick="S.selStudent=${JSON.stringify(s).replace(/</g,'\u003c')};renderDash()">
<div class="student-name">${s.name}</div>
<div class="student-meta">スコア${s.score} / ${s.pct}% / ${new Date(s.time).toLocaleString('ja-JP')}</div>
</div>`).join('')||'<div style="text-align:center;color:#888;padding:20px">データがありません</div>';
  }
  render(`<div class="dash-screen">
<div class="dash-header"><button class="back-btn" onclick="showTitle()">← 戻る</button><h2>📊 教員ダッシュボード</h2></div>
<div class="dash-tabs">
<button class="tab-btn ${S.dashTab==='rank'?'active':''}" onclick="S.dashTab='rank';S.selStudent=null;renderDash()">ランキング</button>
<button class="tab-btn ${S.dashTab==='qstat'?'active':''}" onclick="S.dashTab='qstat';S.selStudent=null;renderDash()">問題別</button>
<button class="tab-btn ${S.dashTab==='hist'?'active':''}" onclick="S.dashTab='hist';S.selStudent=null;renderDash()">学生履歴</button>
</div>
<div class="dash-body">${body}</div>
<div style="padding:10px 16px">
<button class="csv-btn" onclick="downloadCSV()">📥 CSV出力</button>
<button class="del-btn" onclick="if(confirm('全データを削除しますか？'))clearAllResults().then(()=>{S.students=[];alert('削除しました');renderDash();})">🗑️ 全データ削除</button>
</div>
</div>`);
}

function downloadCSV(){
  const students=S.students||[];
  const rows=[['名前','スコア','正解率(%)','正解数','最大連続正解','受験日時']];
  students.sort((a,b)=>b.score-a.score).forEach(s=>rows.push([s.name,s.score,s.pct,s.correct,s.maxStreak,new Date(s.time).toLocaleString('ja-JP')]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='quiz_results.csv';a.click();
}

showTitle();
</script>
</body>
